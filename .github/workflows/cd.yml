name: CD — 운영 배포

on:
  push:
    branches: [main]   # main 브랜치 머지 시에만 배포

jobs:
  build-and-push:
    name: Docker 이미지 빌드 & 레지스트리 푸시
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 이미지 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/rag-api:latest
            ${{ secrets.DOCKER_USERNAME }}/rag-api:${{ github.sha }}

  deploy-staging:
    name: 스테이징 서버 배포
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: GCP 인증 (Staging)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_STAGING }}
          
      - name: Cloud Run 스테이징 배포
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: nurinamu-api-staging
          region: asia-northeast3
          image: ${{ secrets.DOCKER_USERNAME }}/rag-api:latest

  deploy-production:
    name: 운영 서버 배포 (무중단 Rolling)
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: production        # GitHub에서 수동 승인 필요
      url: https://api.nurinamu.go.kr

    steps:
      - name: GCP 인증 (Production)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_PROD }}

      - name: Cloud Run 운영 배포
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: nurinamu-api-prod
          region: asia-northeast3
          image: ${{ secrets.DOCKER_USERNAME }}/rag-api:${{ github.sha }}
          env_vars: |
            APP_ENV=production
